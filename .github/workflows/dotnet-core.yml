name: netstandard

on:
  workflow_dispatch:

concurrency:
  group: rconsharp-manual-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Validate
        run: bash scripts/validate.sh
