name: Catalog Manifest

on:
  pull_request:
    paths:
      - polyhydra.project.json
  push:
    branches: [main]
    paths:
      - polyhydra.project.json
  workflow_dispatch:

concurrency:
  group: rconsharp-catalog-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    uses: lancer1977/dev-forge/.github/workflows/catalog-manifest-validate-reusable.yml@main
